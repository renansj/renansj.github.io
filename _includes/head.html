<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self' 'sha256-mOt5CQEidsRudZgzHoj8tnDYBi4K6FxrEQJWv1mhzX0='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; form-action 'self'; base-uri 'self'; manifest-src 'self'"
  />

  <title>
    {%if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}
  </title>

  <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl | replace: '//', '/' }}?v={{ site.time | date: '%s' }}">

  <link
    href="/atom.xml"
    type="application/atom+xml"
    rel="alternate"
    title="ATOM Feed"
  />

  {% if page.layout == "post" %}
  <!-- Citation metadata (Highwire Press tags) so tools like Google Scholar can index the article. -->
  <meta name="citation_title" content="{{ page.title }}" />
  <meta name="citation_author" content="{{ site.owner }}" />
  <meta name="citation_publication_date" content="{{ page.date | date: '%Y/%m/%d' }}" />
  <meta name="citation_online_date" content="{{ page.date | date: '%Y/%m/%d' }}" />
  <meta name="citation_public_url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  {% endif %}

  <script src="/assets/copy-code.js?v={{ site.time | date: '%s' }}" defer></script>
  <script src="/assets/anchors.js?v={{ site.time | date: '%s' }}" defer></script>
  {% seo %}
</head>
