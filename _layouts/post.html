---
layout: default
---

<article>
  <h2>{{ page.title }}</h2>
  <time datetime="{{ page.date | date_to_xmlschema }}" class="by-line">{{ page.date | date: "%d %b %Y" }}</time>
  {% if page.tags.size > 0 %}
  <div class="post-tags">
    {% for tag in page.tags %}
      <a href="/tags#{{ tag | slugify }}" class="tag">{{ tag }}</a>
    {% endfor %}
  </div>
  {% endif %}
  {{ content }}
</article>
